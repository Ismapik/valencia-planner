<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valencia 2026</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>ES</text></svg>">
</head>
<body>
  <div id="app">
    <header class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="hero-flag">ES</div>
        <h1>Valencia 2026</h1>
        <p class="hero-sub">6 - 13 juli | Ismael | Mike | Zil | Gez</p>
        <p class="hero-location">La Cabanyal</p>
        <div class="hero-stats">
          <span>aankomst 6 juli 9:20</span>
          <span>vertrek 13 juli 14:25</span>
        </div>
      </div>
    </header>
    <nav class="day-nav" id="dayNav">
      <button class="day-btn active" data-day="0" onclick="switchDay(0)">Overzicht</button>
      <button class="day-btn" data-day="1" onclick="switchDay(1)">1 ma</button>
      <button class="day-btn" data-day="2" onclick="switchDay(2)">2 di</button>
      <button class="day-btn" data-day="3" onclick="switchDay(3)">3 wo</button>
      <button class="day-btn" data-day="4" onclick="switchDay(4)">4 do</button>
      <button class="day-btn" data-day="5" onclick="switchDay(5)">5 vr</button>
      <button class="day-btn" data-day="6" onclick="switchDay(6)">6 za</button>
      <button class="day-btn" data-day="7" onclick="switchDay(7)">7 zo</button>
      <button class="day-btn" data-day="8" onclick="switchDay(8)">8 ma</button>
    </nav>
    <main id="content"></main>
    <footer class="site-footer">
      <p>Valencia Vacation Planner | Gemaakt door Deep Code</p>
    </footer>
  </div>
  <script src="app.js"></script>
</body>
</html>
